# GoReleaser config — builds the shipping-service release binary on `v*` tags.
# Artifacts match the duynhlab/packages build-local contract so packages can
# consume the GitHub Release directly (see gha-workflows/.github/workflows/goreleaser.yml).
version: 2

project_name: shipping-service

builds:
  - id: shipping-service
    main: ./cmd
    binary: bin/shipping-service # keep the bin/ prefix inside the archive
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    # -> shipping-service-<version>-linux-amd64.tar.gz (containing bin/shipping-service)
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  split: true # one <artifact>.sha256 per file

changelog:
  use: github

release:
  # owner/repo auto-detected from the git remote.
  extra_files:
    - glob: ./build-info.env # generated by the reusable workflow

gomod:
  proxy: true
